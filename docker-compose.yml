version: "3.8"

services:
  # L1 + L2 + Flask Dashboard (existing)
  zk-rollup:
    build: .
    container_name: zk-rollup-demo
    ports:
      - "3000:3000" # Flask Dashboard
      - "8545:8545" # L1 RPC
      - "5000:5000" # ZK Rollup L2 API
      - "5001:5001" # Optimistic Rollup L2 API (NEW)
      - "9100:9100" # Prometheus metrics endpoint
    environment:
      - BATCH_SIZE=100
      - BATCH_INTERVAL=10
    volumes:
      - zk-data:/app/data
    networks:
      - zk-network

  # Prometheus - Metrics collection & storage
  prometheus:
    image: prom/prometheus:latest
    container_name: zk-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - zk-network
    depends_on:
      - zk-rollup

  # Grafana - Visualization dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: zk-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - zk-network
    depends_on:
      - prometheus

networks:
  zk-network:
    driver: bridge

volumes:
  zk-data:
  prometheus-data:
  grafana-data:
